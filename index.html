<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Player</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: transparent;
        --surface: #ffffff;
        --border: #e4e0db;
        --text: #2c2a27;
        --text-dim: #8a8580;
        --accent: #2c2a27;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        min-height: 100vh;
        padding: 12px;
      }

      .player {
        display: flex;
        align-items: center;
        position: relative;
        user-select: none;
        direction: rtl; /* icon stays right, title expands left */
      }

      /* --- Icon button --- */
      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
        display: grid;
        place-items: center;
        color: var(--text-dim);
        transition: color 0.2s;
        position: relative;
        z-index: 2;
        flex-shrink: 0;
      }
      .icon-btn:hover {
        color: var(--accent);
      }
      .icon-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      .track-title {
        direction: ltr;
        font-size: 11px;
        font-weight: 300;
        color: var(--text-dim);
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        max-width: 0;
        opacity: 0;
        padding-right: 0;
        transition:
          max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.3s ease,
          padding-right 0.3s ease;
      }

      .player:hover .track-title.has-title {
        max-width: 220px;
        opacity: 1;
        padding-right: 4px;
        animation: marquee 8s linear infinite 0.4s;
      }

      @keyframes marquee {
        0% {
          text-indent: 0;
        }
        10% {
          text-indent: 0;
        }
        100% {
          text-indent: -100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="player" id="player">
      <button class="icon-btn" id="playBtn" aria-label="Play">
        <svg id="iconOff" viewBox="0 0 24 24">
          <path
            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
        </svg>

        <svg id="iconOn" viewBox="0 0 24 24" style="display: none">
          <path
            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
        </svg>
      </button>

      <span class="track-title" id="trackTitle"></span>
    </div>

    <script>
      /*
    URL PARAMS:
      src    = audio file URL (.wav, .mp3, etc.)  [required]
      title  = track title (shown on hover, slides left)
      accent = hex color, URL-encoded

    SQUARESPACE:
    <div style="position:fixed; bottom:16px; right:16px; z-index:2147483647;">
      <iframe
        src="https://yoursite.github.io/audio-player/?src=https://example.com/sound.wav&title=Track%20Name"
        width="280" height="80" frameborder="0"
        style="border:none;" allow="autoplay">
      </iframe>
    </div>
  */

      const params = new URLSearchParams(window.location.search)
      if (params.get("accent")) {
        document.documentElement.style.setProperty(
          "--accent",
          decodeURIComponent(params.get("accent"))
        )
      }

      const audio = new Audio()
      const playBtn = document.getElementById("playBtn")
      const iconOn = document.getElementById("iconOn")
      const iconOff = document.getElementById("iconOff")
      const titleEl = document.getElementById("trackTitle")

      audio.volume = 0.8
      audio.loop = true
      audio.preload = "metadata"

      const audioSrc = params.get("src") || "/files/Muitat_Georg Buljo.mp3"
      const titleText =
        params.get("title") ||
        "title of file that's really long and will overflow"

      audio.src = audioSrc
      titleEl.textContent = titleText
      if (titleText) titleEl.classList.add("has-title")

      playBtn.addEventListener("click", () => {
        audio.paused ? audio.play() : audio.pause()
      })

      audio.addEventListener("play", () => {
        iconOff.style.display = "none"
        iconOn.style.display = "block"
      })

      audio.addEventListener("pause", () => {
        iconOn.style.display = "none"
        iconOff.style.display = "block"
      })
    </script>
  </body>
</html>
