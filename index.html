<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Player</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: transparent;
        --surface: #ffffff;
        --border: #e4e0db;
        --text: #2c2a27;
        --text-dim: #8a8580;
        --accent: #2c2a27;
        --accent-hover: #4a4843;
        --radius: 40px;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 12px;
      }

      .player {
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 20px 8px 8px;
        transition:
          box-shadow 0.3s,
          border-color 0.3s;
        max-width: 280px;
        width: 100%;
      }
      .player:hover {
        border-color: #ccc8c2;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      }

      /* --- Play button --- */
      .play-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--accent);
        cursor: pointer;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        transition:
          background 0.2s,
          color 0.2s,
          border-color 0.2s;
      }
      .play-btn:hover {
        background: var(--accent);
        color: var(--surface);
        border-color: var(--accent);
      }
      .play-btn svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }
      .play-btn .icon-play {
        margin-left: 2px;
      }

      /* --- Label --- */
      .label {
        font-size: 13px;
        font-weight: 400;
        color: var(--text-dim);
        letter-spacing: 0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        user-select: none;
      }

      /* --- Subtle EQ bars animation when playing --- */
      .eq-bars {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 14px;
        margin-left: auto;
        flex-shrink: 0;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .eq-bars.active {
        opacity: 1;
      }
      .eq-bars span {
        display: block;
        width: 2.5px;
        background: var(--text-dim);
        border-radius: 1px;
        animation: eq 1s ease-in-out infinite alternate;
      }
      .eq-bars span:nth-child(1) {
        height: 4px;
        animation-delay: 0s;
      }
      .eq-bars span:nth-child(2) {
        height: 8px;
        animation-delay: 0.2s;
      }
      .eq-bars span:nth-child(3) {
        height: 5px;
        animation-delay: 0.4s;
      }
      .eq-bars span:nth-child(4) {
        height: 10px;
        animation-delay: 0.15s;
      }

      @keyframes eq {
        0% {
          height: 3px;
        }
        100% {
          height: 14px;
        }
      }

      /* --- Volume --- */
      .vol-wrap {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-left: auto;
        flex-shrink: 0;
      }
      .vol-icon {
        width: 14px;
        height: 14px;
        color: var(--text-dim);
        cursor: pointer;
        flex-shrink: 0;
      }
      .vol-icon svg {
        width: 100%;
        height: 100%;
        fill: currentColor;
      }
      .volume-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 50px;
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        outline: none;
      }
      .volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
      }
      .volume-slider::-moz-range-thumb {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: none;
      }

      .error-msg {
        font-size: 12px;
        color: var(--text-dim);
        text-align: center;
        padding: 16px;
      }

      @media (max-width: 300px) {
        .player {
          padding: 6px 14px 6px 6px;
          gap: 10px;
        }
        .label {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="player" id="player">
      <button class="play-btn" id="playBtn" aria-label="Play">
        <svg class="icon-play" id="iconPlay" viewBox="0 0 24 24">
          <polygon points="7,4 20,12 7,20" />
        </svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display: none">
          <rect x="6" y="4" width="3.5" height="16" rx="1" />
          <rect x="14.5" y="4" width="3.5" height="16" rx="1" />
        </svg>
      </button>

      <span class="label" id="label">Listen</span>

      <div class="eq-bars" id="eqBars">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="vol-wrap">
        <div class="vol-icon" id="volIcon">
          <svg viewBox="0 0 24 24">
            <path
              d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
          </svg>
        </div>
        <input
          type="range"
          class="volume-slider"
          id="volumeSlider"
          min="0"
          max="1"
          step="0.01"
          value="0.8" />
      </div>
    </div>

    <script>
      /*
    URL PARAMS (set in the iframe src):

      src    = direct URL to audio file (.wav, .mp3, etc.)  [required]
      label  = button label text (default: "Listen")
      accent = hex color, URL-encoded (e.g. %232c2a27)

    SQUARESPACE CODE BLOCK:

    <iframe
      src="https://yoursite.github.io/audio-player/?src=https://example.com/sound.wav&label=Listen"
      width="280" height="64" frameborder="0"
      style="border:none;" allow="autoplay">
    </iframe>
  */

      const params = new URLSearchParams(window.location.search)
      if (params.get("accent")) {
        document.documentElement.style.setProperty(
          "--accent",
          decodeURIComponent(params.get("accent"))
        )
      }

      const audio = new Audio()
      const playBtn = document.getElementById("playBtn")
      const iconPlay = document.getElementById("iconPlay")
      const iconPause = document.getElementById("iconPause")
      const labelEl = document.getElementById("label")
      const eqBars = document.getElementById("eqBars")
      const volSlider = document.getElementById("volumeSlider")
      const volIcon = document.getElementById("volIcon")
      const playerEl = document.getElementById("player")

      audio.volume = 0.8
      audio.loop = true
      audio.preload = "metadata"

      const audioSrc =
        params.get("src") ||
        "https://cdn.freesound.org/previews/848/848962_17814297-lq.mp3"

      if (!audioSrc) {
        playerEl.innerHTML =
          '<div class="error-msg">No audio source — add ?src=URL to iframe</div>'
      } else {
        audio.src = audioSrc
        labelEl.textContent = params.get("label") || "Listen"

        playBtn.addEventListener("click", () => {
          audio.paused ? audio.play() : audio.pause()
        })

        audio.addEventListener("play", () => {
          iconPlay.style.display = "none"
          iconPause.style.display = "block"
          eqBars.classList.add("active")
          labelEl.textContent = params.get("label") || "Now playing"
        })

        audio.addEventListener("pause", () => {
          iconPlay.style.display = "block"
          iconPause.style.display = "none"
          eqBars.classList.remove("active")
          labelEl.textContent = params.get("label") || "Listen"
        })

        volSlider.addEventListener("input", (e) => {
          audio.volume = parseFloat(e.target.value)
          audio.muted = false
        })

        volIcon.addEventListener("click", () => {
          audio.muted = !audio.muted
          volSlider.value = audio.muted ? 0 : audio.volume
        })
      }
    </script>
  </body>
</html>
